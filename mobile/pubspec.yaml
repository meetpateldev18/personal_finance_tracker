name: personal_finance_tracker
description: A production-grade personal finance management mobile app with AI insights and Slack notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Image picker (receipt upload)
  image_picker: ^1.1.2

  # Cached images
  cached_network_image: ^3.3.1

  # Charts
  fl_chart: ^0.68.0

  # Date/number formatting
  intl: ^0.19.0

  # Local storage
  shared_preferences: ^2.2.3

  # Loading / shimmer
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Env config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.2
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
