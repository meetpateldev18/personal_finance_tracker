name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: finance-tracker-cluster

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Test all Spring Boot microservices in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - transaction-service
          - budget-service
          - analytics-service
          - notification-service
          - ai-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: finance_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/finance_db_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-at-least-32-characters-long
        run: mvn -B test --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build and push Docker images to ECR (main branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: user-service
            port: 8081
          - service: transaction-service
            port: 8082
          - service: budget-service
            port: 8083
          - service: analytics-service
            port: 8084
          - service: notification-service
            port: 8085
          - service: ai-service
            port: 8086

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21 (for Maven build)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (skip tests — already run)
        working-directory: backend/${{ matrix.service }}
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Build and push Docker image
        working-directory: backend/${{ matrix.service }}
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/finance-${{ matrix.service }}:${{ steps.vars.outputs.tag }}
          LATEST: ${{ env.ECR_REGISTRY }}/finance-${{ matrix.service }}:latest
        run: |
          docker build -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Save image URI as output
        run: |
          echo "${{ matrix.service }}=${{ env.ECR_REGISTRY }}/finance-${{ matrix.service }}:${{ steps.vars.outputs.tag }}" \
            >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Deploy each service to ECS Fargate
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      # Deploy services serially to avoid thundering-herd on ECS
      max-parallel: 1
      matrix:
        service:
          - user-service
          - transaction-service
          - budget-service
          - analytics-service
          - notification-service
          - ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition finance-${{ matrix.service }} \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ matrix.service }}
          image: ${{ env.ECR_REGISTRY }}/finance-${{ matrix.service }}:${{ steps.vars.outputs.tag }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: finance-${{ matrix.service }}-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Smoke tests after deploy
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check health endpoints
        env:
          API_HOST: ${{ secrets.PROD_API_HOST }}
        run: |
          check_health() {
            local url="$1"
            local service="$2"
            local max_retries=5
            local wait=10
            for i in $(seq 1 $max_retries); do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url/actuator/health")
              if [ "$status" = "200" ]; then
                echo "✅ $service is healthy"
                return 0
              fi
              echo "⏳ $service not ready (attempt $i/$max_retries) — waiting ${wait}s"
              sleep $wait
            done
            echo "❌ $service health check failed"
            return 1
          }

          check_health "$API_HOST:8081" "user-service"
          check_health "$API_HOST:8082" "transaction-service"
          check_health "$API_HOST:8083" "budget-service"
          check_health "$API_HOST:8084" "analytics-service"
          check_health "$API_HOST:8085" "notification-service"
          check_health "$API_HOST:8086" "ai-service"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Notify Slack on deployment result
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.smoke-tests.result }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            COLOR="good"
            TEXT="Deployment to *production* succeeded"
          else
            EMOJI="❌"
            COLOR="danger"
            TEXT="Deployment to *production* FAILED — check the run"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"text\": \"$EMOJI $TEXT\",
                \"fields\": [
                  {\"title\":\"Repository\",\"value\":\"$GITHUB_REPOSITORY\",\"short\":true},
                  {\"title\":\"Branch\",\"value\":\"${GITHUB_REF##*/}\",\"short\":true},
                  {\"title\":\"Commit\",\"value\":\"${GITHUB_SHA::8}\",\"short\":true},
                  {\"title\":\"Run\",\"value\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"short\":false}
                ]
              }]
            }"
